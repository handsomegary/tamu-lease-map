<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive US Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --page: #f5f1ea;
      --ink: #1f2d36;
      --muted: #65727c;
      --line: #d8cfc2;
      --panel: #fffdf8;
      --state: #d9e1e6;
      --state-alt: #ccd7dd;
      --hover: #ff8a5c;
      --active: #1f9d8a;
      --focus: #f2c94c;
      --border: #ffffff;
      --shadow: 0 22px 50px rgba(31, 45, 54, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(31, 157, 138, 0.08), transparent 42%),
        var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 2.25rem;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .readout {
      min-width: 210px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: 0 12px 30px rgba(31, 45, 54, 0.08);
    }

    .readout-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .readout-state {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 5px;
      white-space: nowrap;
    }

    .readout-name {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .readout-code {
      color: var(--active);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .map-board {
      position: relative;
      flex: 1;
      display: grid;
      place-items: center;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 12%, rgba(242, 201, 76, 0.18), transparent 30%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 253, 248, 0.72));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .map-frame {
      width: min(100%, 1080px);
      overflow: hidden;
      border-radius: 6px;
    }
    .tamu-leaflet-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 10;
      width: min(calc(100% - 84px), 940px);
      height: min(66vh, 610px);
      min-height: 360px;
      overflow: hidden;
      border: 1px solid rgba(31, 45, 54, 0.18);
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 0 24px 56px rgba(31, 45, 54, 0.2);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -48%) scale(0.92);
      transition: opacity 280ms ease, transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .map-board.is-tamu-zooming .tamu-leaflet-panel {
      opacity: 0.22;
      transform: translate(-50%, -50%) scale(0.96);
    }

    .map-board.is-tamu-zoom .tamu-leaflet-panel,
    .map-board.is-iah-zooming .tamu-leaflet-panel,
    .map-board.is-iah-zoom .tamu-leaflet-panel {
      position: fixed;
      inset: 0;
      left: 0;
      top: 0;
      z-index: 10;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }

    .map-board.is-tamu-zoom .reset-view,
    .map-board.is-iah-zoom .reset-view {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
    }

    .iah-leaflet-map {
      display: none;
      width: 100%;
      height: 100%;
      background: #edf2f0;
    }

    .map-board.is-iah-zooming .tamu-leaflet-map,
    .map-board.is-iah-zoom .tamu-leaflet-map {
      display: block;
    }

    .map-board.is-iah-zooming .iah-leaflet-map,
    .map-board.is-iah-zoom .iah-leaflet-map {
      display: none;
    }
    .tamu-leaflet-map {
      display: block;
      width: 100%;
      height: 100%;
      background: #edf2f0;
    }

    .tamu-leaflet-status {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 2;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(255, 253, 248, 0.94);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(31, 45, 54, 0.14);
    }

    .lease-pin-icon,
    .building-pin-icon {
      border: 0;
      background: transparent;
    }

    .lease-pin,
    .building-pin {
      position: relative;
      display: block;
      width: 30px;
      height: 30px;
      border: 3px solid #ffffff;
      border-radius: 50% 50% 50% 0;
      background: #d9534f;
      box-shadow: 0 11px 22px rgba(36, 42, 46, 0.3);
      transform: rotate(-45deg);
      transform-origin: 50% 50%;
    }

    .lease-pin::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }

    .leaflet-marker-icon:hover .lease-pin {
      filter: brightness(1.05);
      transform: rotate(-45deg) translate(2px, -2px);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      box-shadow: 0 18px 46px rgba(31, 45, 54, 0.22);
    }

    .leaflet-popup-content {
      margin: 0;
      min-width: 240px;
      color: var(--ink);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .tamu-popup {
      padding: 14px 15px 15px;
      color: var(--ink);
    }

    .tamu-popup h3 {
      margin: 0 0 9px;
      font-size: 1rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .tamu-popup .rent {
      margin: 0 0 11px;
      color: #d9534f;
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .tamu-popup .address {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 650;
      line-height: 1.35;
    }

    .route-label {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .route-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .route-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #ffc107;
      color: #2d2300;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: inset 0 -1px 0 rgba(45, 35, 0, 0.16);
    }

    .route-empty {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .leaflet-control-layers {
      border: 1px solid var(--line) !important;
      border-radius: 8px !important;
      box-shadow: 0 10px 28px rgba(31, 45, 54, 0.12) !important;
    }

    .map-board.is-tamu-zoom .leaflet-bottom.leaflet-right {
      right: 18px;
      bottom: 18px;
    }

    .leaflet-control-layers-expanded {
      padding: 9px 11px 10px !important;
    }

    #usa-map {
      display: block;
      width: 100%;
      height: auto;
      max-height: 72vh;
      overflow: hidden;
      filter: drop-shadow(0 12px 18px rgba(31, 45, 54, 0.08));
    }

    #usa-map g.state > path,
    #usa-map circle.dc {
      fill: var(--state);
      stroke: rgba(31, 45, 54, 0.16);
      stroke-width: 1.05;
      cursor: pointer;
      transition: fill 0.18s ease, stroke 0.18s ease;
      vector-effect: non-scaling-stroke;
      outline: none;
    }

    #usa-map g.state > path.is-alt {
      fill: var(--state-alt);
    }

    #usa-map.texas-only g.state > path:not(.tx),
    #usa-map.texas-only circle.dc,
    #usa-map.texas-only .separator1 {
      opacity: 0;
      pointer-events: none;
    }

    #usa-map.texas-only g.borders path:not(.ar-tx):not(.la-tx):not(.nm-tx):not(.ok-tx) {
      opacity: 0;
    }

    #usa-map.texas-only g.state > path.tx {
      cursor: default;
      pointer-events: none;
    }

    #usa-map.texas-only g.state > path.tx:hover,
    #usa-map.texas-only g.state > path.tx.is-active,
    #usa-map.texas-only g.state > path.tx:focus-visible {
      fill: var(--state) !important;
      stroke: rgba(31, 45, 54, 0.16) !important;
      stroke-width: 1.05 !important;
    }
    #usa-map.texas-only .city-pin {
      opacity: 1;
      pointer-events: all;
    }
    #usa-map g.state > path.dc {
      pointer-events: none;
    }


    #usa-map g.state > path:not(.is-zoomed):hover,
    #usa-map g.state > path.is-active,
    #usa-map g.state > path:focus-visible,
    #usa-map circle.dc:not(.is-zoomed):hover,
    #usa-map circle.dc.is-active,
    #usa-map circle.dc:focus-visible {
      fill: var(--hover) !important;
      stroke: #ffffff !important;
      stroke-width: 1.5px !important;
      stroke-linejoin: round;
      cursor: pointer;
      transform: none !important;
      filter: none !important;
    }

    #usa-map g.state > path.is-zoomed,
    #usa-map circle.dc.is-zoomed {
      fill: var(--active);
      stroke: rgba(31, 45, 54, 0.36);
      stroke-width: 1.05;
      transform: none;
      filter: none;
    }

    #usa-map g.state > path:focus-visible,
    #usa-map circle.dc:focus-visible {
      stroke: var(--focus);
      stroke-width: 2.4;
    }

    #usa-map g.borders,
    #usa-map .separator1 {
      pointer-events: none;
    }

    #usa-map g.borders path {
      stroke: var(--border);
      stroke-width: 1.32;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 210ms cubic-bezier(0.2, 0.8, 0.2, 1), stroke 210ms ease, opacity 180ms ease;
      vector-effect: non-scaling-stroke;
      transform-box: fill-box;
      transform-origin: center;
    }

    #usa-map g.borders path.is-active-border {
      stroke: #ffffff;
      stroke-width: 1.5px;
      filter: none;
      opacity: 1;
    }
    #usa-map g.borders path.is-zoomed-border {
      transform: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 1.32;
      filter: none;
      opacity: 1;
    }

    #usa-map.is-zoomed g.borders path:not(.is-zoomed-border):not(.is-active-border),
    #usa-map.is-zoomed .separator1 {
      opacity: 0;
    }

    #usa-map .separator1 {
      stroke: rgba(101, 114, 124, 0.54);
      stroke-width: 2.2;
      fill: none;
      transition: opacity 180ms ease;
    }

    #usa-map .tamu-detail {
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    #usa-map.is-tamu-zooming .tamu-detail,
    #usa-map.is-tamu-zoom .tamu-detail {
      opacity: 1;
    }

    #usa-map.is-tamu-zoom > g.states,
    #usa-map.is-tamu-zoom > g.state,
    #usa-map.is-iah-zoom > g.states,
    #usa-map.is-iah-zoom > g.state,
    #usa-map.is-tamu-zoom > g.borders,
    #usa-map.is-tamu-zoom > circle.state,
    #usa-map.is-tamu-zoom > .separator1 {
      opacity: 0;
      pointer-events: none;
    }
    #usa-map .tamu-local-frame {
      fill: rgba(255, 253, 248, 0.96);
      stroke: rgba(31, 45, 54, 0.18);
      stroke-width: 1.2;
      vector-effect: non-scaling-stroke;
    }

    #usa-map .campus-pin {
      cursor: pointer;
      pointer-events: all;
      outline: none;
    }

    #usa-map .city-pin {
      opacity: 0;
      pointer-events: none;
    }

    #usa-map.is-zoomed .city-pin,
    #usa-map.is-tamu-zooming .city-pin,
    #usa-map.is-tamu-zoom .city-pin,
    #usa-map.is-iah-zooming .city-pin,
    #usa-map.is-iah-zoom .city-pin {
      opacity: 1;
      pointer-events: all;
    }

    #usa-map .campus-pin-shape {
      transition: filter 160ms ease, transform 160ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    #usa-map .campus-pin .pin-body {
      fill: #c41230;
      stroke: #7a1022;
      stroke-width: 1.6;
    }

    #usa-map .campus-pin .pin-center {
      fill: #ffffff;
      stroke: rgba(31, 45, 54, 0.16);
      stroke-width: 0.7;
    }

    #usa-map .campus-pin .pin-label {
      fill: #7a1022;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    #usa-map .campus-pin:hover .campus-pin-shape,
    #usa-map .campus-pin.is-active .campus-pin-shape,
    #usa-map .campus-pin:focus-visible .campus-pin-shape {
      transform: translateY(-5px);
      filter: drop-shadow(0 14px 10px rgba(31, 45, 54, 0.28));
    }

    #usa-map .campus-pin:focus-visible .pin-body {
      stroke: var(--focus);
      stroke-width: 2.4;
    }
    .reset-view {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 12;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(31, 45, 54, 0.18);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.94);
      color: var(--ink);
      font: inherit;
      font-size: 0.86rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(31, 45, 54, 0.14);
    }

    .reset-view:hover,
    .reset-view:focus-visible {
      border-color: rgba(31, 157, 138, 0.5);
      outline: none;
    }
    .tooltip {
      position: fixed;
      z-index: 20;
      left: 0;
      top: 0;
      max-width: min(280px, calc(100vw - 24px));
      padding: 9px 11px;
      border: 1px solid rgba(31, 45, 54, 0.14);
      border-radius: 8px;
      background: rgba(31, 45, 54, 0.95);
      color: white;
      font-size: 0.92rem;
      font-weight: 800;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 14px));
      box-shadow: 0 16px 32px rgba(31, 45, 54, 0.24);
    }

    .tooltip small {
      display: block;
      margin-top: 2px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      main {
        padding: 16px;
        gap: 14px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      h1 {
        font-size: 1.8rem;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 0.95rem;
      }

      .readout {
        min-width: 0;
        width: 100%;
      }

      .readout-state {
        white-space: normal;
      }

      .map-board {
        padding: 10px;
      }

      #usa-map {
        max-height: 64vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Interactive Texas Map</h1>
        <p class="subtitle">Texas-focused view with TAMU and city pins.</p>
      </div>
      <aside class="readout" aria-live="polite">
        <span class="readout-label">Selected region</span>
        <div class="readout-state">
          <span class="readout-name" data-state-name>Texas</span>
          <span class="readout-code" data-state-code>TX</span>
        </div>
      </aside>
    </header>

    <section class="map-board" aria-label="Interactive map area">
      <div class="map-frame">
<svg id="usa-map" class="texas-only" xmlns="http://www.w3.org/2000/svg" viewBox="220 310 440 272.23" role="img" aria-labelledby="mapTitle mapDesc" preserveAspectRatio="xMidYMid meet">
  <title id="mapTitle">Interactive Texas map</title>
  <desc id="mapDesc">Texas-focused map with the original U.S. state SVG data preserved but hidden.</desc>
  <defs>
    <filter id="state-extrude" x="-24%" y="-30%" width="148%" height="172%" color-interpolation-filters="sRGB">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1.2" result="bulkAlpha"/>
      <feOffset in="bulkAlpha" dx="0" dy="14" result="sideOffset"/>
      <feFlood flood-color="#9e4937" flood-opacity="0.98" result="sideColor"/>
      <feComposite in="sideColor" in2="sideOffset" operator="in" result="side"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="softTop"/>
      <feSpecularLighting in="softTop" surfaceScale="3.2" specularConstant="0.32" specularExponent="18" lighting-color="#fff4df" result="bevelLight">
        <fePointLight x="-90" y="-120" z="150"/>
      </feSpecularLighting>
      <feComposite in="bevelLight" in2="SourceAlpha" operator="in" result="topLight"/>
      <feComposite in="topLight" in2="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="0.2" k4="0" result="litTop"/>
      <feMerge>
        <feMergeNode in="side"/>
        <feMergeNode in="litTop"/>
      </feMerge>
    </filter>
  </defs>

      return Array.from(element.classList)

    function formatCoords(coords) {
      return `[${Number(coords[0]).toFixed(12)}, ${Number(coords[1]).toFixed(12)}]`;
    }

    function saveLeaseCoordDraft(lease, latLng) {
      const coords = [latLng.lat, latLng.lng];
      lease.coords = coords;
      const draft = { ...(window.tamuLeaseCoordsDraft || {}) };
      draft[lease.name] = coords;
      window.tamuLeaseCoordsDraft = draft;
      try {
        localStorage.setItem("tamuLeaseCoordsDraft", JSON.stringify(draft));
      } catch (error) {
        console.warn("Could not save TAMU lease coord draft", error);
      }
      setTamuLeafletStatus(`${lease.name}: ${formatCoords(coords)}`);
    }

    function saveBuildingCoordDraft(building, latLng) {
      const coords = [latLng.lat, latLng.lng];
      building.coords = coords;
      const draft = { ...(window.tamuBuildingCoordsDraft || {}) };
      draft[building.name] = coords;
      window.tamuBuildingCoordsDraft = draft;
      try {
        localStorage.setItem("tamuBuildingCoordsDraft", JSON.stringify(draft));
      } catch (error) {
        console.warn("Could not save TAMU building coord draft", error);
      }
      setTamuLeafletStatus(`${building.name}: ${formatCoords(coords)}`);
    }
    async function loadGeoJson(url) {
      const response = await fetch(url, { cache: "no-cache" });
      if (!response.ok) {
        throw new Error(`${url} returned ${response.status}`);
      }
      return response.json();
    }

    function isRoadGeometry(feature) {
      const type = feature?.geometry?.type;
      return type === "LineString" || type === "MultiLineString";
    }

    function splitRoutes(routeText) {
      return String(routeText || "")
        .split(",")
        .map((route) => route.trim())
        .filter(Boolean);
    }

    function appendText(parent, tagName, className, text) {
      const element = document.createElement(tagName);
      if (className) {
        element.className = className;
      }
      element.textContent = text;
      parent.appendChild(element);
      return element;
    }

    function formatRoute(route, lease) {
      if (route === "0") {
        return lease.bus_stop || "Walk";
      }
      return `Route ${route}`;
    }

    function createLeasePopup(lease) {
      const wrapper = document.createElement("div");
      wrapper.className = "tamu-popup";

      appendText(wrapper, "h3", "", lease.name || "Unnamed apartment");
      appendText(wrapper, "p", "rent", lease.rent || "Rent not listed");
      appendText(wrapper, "p", "address", lease.address || "Address not listed");
      appendText(wrapper, "p", "route-label", lease.bus_stop ? `Bus stop: ${lease.bus_stop}` : "Bus routes");

      const badges = document.createElement("div");
      badges.className = "route-badges";
      const routes = splitRoutes(lease.bus_route);

      if (routes.length) {
        routes.forEach((route) => appendText(badges, "span", "route-badge", formatRoute(route, lease)));
      } else {
        appendText(badges, "span", "route-empty", "No bus routes listed");
      }

      wrapper.appendChild(badges);
      if (isDraggableLease(lease)) {
        appendText(wrapper, "p", "address", `Coords: ${formatCoords(lease.coords)}`);
        appendText(wrapper, "p", "route-label", "Drag to adjust, then tell Codex to lock it.");
      }
      return wrapper;
    }

    function createBuildingPopup(building) {
      const wrapper = document.createElement("div");
      wrapper.className = "tamu-popup";
      appendText(wrapper, "h3", "", building.name || "Campus building");
      if (building.address) {
        appendText(wrapper, "p", "address", building.address);
      }
      appendText(wrapper, "p", "address", building.category || "Campus building");
      return wrapper;
    }

    function createPlacePopup(place) {
      const wrapper = document.createElement("div");
      wrapper.className = "tamu-popup";
      appendText(wrapper, "h3", "", place.name || "Houston place");
      appendText(wrapper, "p", "address", place.category || "Houston place");
      return wrapper;
    }

    const tamuLeafletBounds = [[30.56900553008426, -96.39116413660328], [30.672623347020696, -96.28665618829454]];
    const tamuLeafletView = { center: [30.62081443855248, -96.33891016244891], zoom: 13, bounds: tamuLeafletBounds, label: "Texas A&M / College Station" };
    const houstonLeafletBounds = [[29.590774151038, -95.573465301882], [30.015598098309, -95.137489983175]];
    const houstonLeafletView = { center: [29.803186124674, -95.355477642529], zoom: 11, bounds: houstonLeafletBounds, label: "Houston / IAH" };
    const tamuRoadBounds = tamuLeafletBounds;
    const houstonRoadBounds = houstonLeafletBounds;
    const sharedRoadStyle = {
      color: "#7a7a7a",
      weight: 2.5,
      opacity: 0.6,
      lineCap: "round",
      lineJoin: "round",
    };

    function syncTamuLeafletSize() {
      if (!tamuLeafletMap) {
        return;
      }
      [0, 120, 420, 900].forEach((delay) => {
        window.setTimeout(() => tamuLeafletMap.invalidateSize(), delay);
      });
    }

    function syncIahLeafletSize() {
      syncTamuLeafletSize();
    }

    function scheduleLeafletWork(callback, delay = 0) {
      window.setTimeout(() => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(callback, { timeout: 1800 });
        } else {
          callback();
        }
      }, delay);
    }

    function createHoustonMarker(place, icon) {
      const marker = L.marker(place.coords, {
        icon,
        riseOnHover: true,
        keyboard: true,
      });
      marker.bindPopup(createPlacePopup(place), {
        maxWidth: 300,
        className: "lease-popup-shell",
      });
      marker.bindTooltip(place.name, { direction: "top", offset: [0, -30] });
      return marker;
    }

    function ensureRoadLayer(delay = 0) {
      if (!tamuLeafletMap) {
        return Promise.resolve();
      }
      if (texasRoadsLoadPromise) {
        return texasRoadsLoadPromise;
      }

      setTamuLeafletStatus("Loading TAMU + TX-6 + Houston roads from export.geojson...");
      texasRoadsLoadPromise = loadGeoJson("export.geojson")
        .then((roadsGeoJson) => new Promise((resolve) => {
          scheduleLeafletWork(() => {
            const roadLayer = L.geoJSON(roadsGeoJson, {
              filter: isRoadGeometry,
              style: sharedRoadStyle,
            }).addTo(texasRoadsLayer);
            syncTamuLeafletSize();
            setTamuLeafletStatus(`Loaded ${roadLayer.getLayers().length} road segments from export.geojson.`);
            window.setTimeout(() => setTamuLeafletStatus(""), 3000);
            resolve(roadLayer);
          }, delay);
        }))
        .catch((error) => {
          console.error(error);
          setTamuLeafletStatus("Could not load export.geojson. Open this page through the local server, not file://.");
        });
      return texasRoadsLoadPromise;
    }

    function maybeLoadVisibleRoads() {
      if (texasRoadsLayer && tamuLeafletMap?.hasLayer(texasRoadsLayer)) {
        ensureRoadLayer(120);
      }
    }
    function focusTexasLeaflet(targetView) {
      if (!tamuLeafletMap) {
        return;
      }
      const view = targetView === "houston" ? houstonLeafletView : tamuLeafletView;
      syncTamuLeafletSize();
      if (view.bounds) {
        tamuLeafletMap.flyToBounds(view.bounds, {
          animate: true,
          duration: 1.05,
          easeLinearity: 0.25,
          padding: [8, 8],
        });
      } else {
        tamuLeafletMap.flyTo(view.center, view.zoom, {
          animate: true,
          duration: 1.05,
          easeLinearity: 0.25,
        });
      }
      ensureRoadLayer(160);
      window.setTimeout(maybeLoadVisibleRoads, 1200);
    }

    function initTexasLeafletMap(targetView = "tamu", shouldFocus = true) {
      if (!tamuLeafletElement) {
        return;
      }
      if (!window.L) {
        setTamuLeafletStatus("Leaflet could not load.");
        return;
      }
      if (tamuLeafletMap) {
        if (shouldFocus) {
          focusTexasLeaflet(targetView);
        }
        return;
      }

      const startView = targetView === "houston" ? houstonLeafletView : tamuLeafletView;
      setTamuLeafletStatus("Opening unified Texas Leaflet map...");
      tamuLeafletMap = L.map(tamuLeafletElement, {
        center: startView.center,
        zoom: startView.zoom,
        zoomControl: true,
        preferCanvas: true,
      });

      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
        subdomains: "abcd",
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      }).addTo(tamuLeafletMap);

      const leaseIcon = L.divIcon({
        className: "lease-pin-icon",
        html: '<span class="lease-pin"></span>',
        iconSize: [36, 44],
        iconAnchor: [18, 42],
        popupAnchor: [0, -38],
      });

      const buildingIcon = L.divIcon({
        className: "building-pin-icon",
        html: '<span class="building-pin"></span>',
        iconSize: [36, 44],
        iconAnchor: [18, 42],
        popupAnchor: [0, -38],
      });

      tamuLeasesLayer = L.layerGroup(leaseData.map((lease) => {
        const draggable = isDraggableLease(lease);
        const marker = L.marker(lease.coords, {
          icon: leaseIcon,
          riseOnHover: true,
          keyboard: true,
          draggable,
          autoPan: draggable,
        });
        marker.bindPopup(createLeasePopup(lease), {
          maxWidth: 360,
          className: "lease-popup-shell",
        });
        marker.bindTooltip(lease.name, { direction: "top", offset: [0, -30] });
        if (draggable) {
          marker.on("dragstart", () => {
            setTamuLeafletStatus(`Dragging ${lease.name}...`);
          });
          marker.on("dragend", () => {
            saveLeaseCoordDraft(lease, marker.getLatLng());
            marker.setPopupContent(createLeasePopup(lease));
            marker.openPopup();
          });
        }
        return marker;
      })).addTo(tamuLeafletMap);

      tamuBuildingsLayer = L.layerGroup(buildingData.map((building) => {
        const draggable = isDraggableBuilding(building);
        const marker = L.marker(building.coords, {
          icon: buildingIcon,
          riseOnHover: true,
          keyboard: true,
          draggable,
          autoPan: draggable,
        });
        marker.bindPopup(createBuildingPopup(building), {
          maxWidth: 300,
          className: "lease-popup-shell",
        });
        marker.bindTooltip(building.name, { direction: "top", offset: [0, -30] });
        if (draggable) {
          marker.on("dragstart", () => {
            setTamuLeafletStatus(`Dragging ${building.name}...`);
          });
          marker.on("dragend", () => {
            saveBuildingCoordDraft(building, marker.getLatLng());
            marker.setPopupContent(createBuildingPopup(building));
            marker.openPopup();
          });
        }
        return marker;
      })).addTo(tamuLeafletMap);

      houstonPlacesLayer = L.layerGroup(houstonFallbackPlaces.map((place) => createHoustonMarker(place, buildingIcon)))
        .addTo(tamuLeafletMap);
      texasRoadsLayer = L.layerGroup().addTo(tamuLeafletMap);

      tamuLeafletLayerControl = L.control.layers(null, {
        Roads: texasRoadsLayer,
        Leases: tamuLeasesLayer,
        "Campus buildings": tamuBuildingsLayer,
        "IAH / TECO": houstonPlacesLayer,
      }, {
        collapsed: false,
        position: "bottomright",
      }).addTo(tamuLeafletMap);

      tamuLeafletMap.on("overlayadd", (event) => {
        if (event.layer === texasRoadsLayer) {
          ensureRoadLayer(80);
        }
      });
      tamuLeafletMap.on("moveend zoomend", maybeLoadVisibleRoads);

      syncTamuLeafletSize();
      if (shouldFocus) {
        focusTexasLeaflet(targetView);
      }
      setTamuLeafletStatus(`Unified map ready. Showing ${leaseData.length} lease pins, ${buildingData.length} campus pins, and Houston place pins.`);
      window.setTimeout(maybeLoadVisibleRoads, 900);
    }

    function initTamuLeafletMap(shouldFocus = true) {
      initTexasLeafletMap("tamu", shouldFocus);

    function initIahLeafletMap(shouldFocus = true) {

    function exitPlaceZoom() {
      map.classList.remove("is-tamu-zoom", "is-tamu-zooming", "is-iah-zoom", "is-iah-zooming");
      mapBoard?.classList.remove("is-tamu-zoom", "is-tamu-zooming", "is-iah-zoom", "is-iah-zooming");

        activePlace.classList.remove("is-active");

    function zoomToTamu(element) {
      if (isPlaceZoomActive()) {
        return;
      }
      if (zoomedElement) {
        zoomedElement.classList.remove("is-zoomed", "is-active");
        zoomedElement = null;
      }
      if (activeState) {
        activeState.classList.remove("is-active");
        activeState = null;
      }
      clearActiveBorders();
      map.classList.remove("is-zoomed", "is-tamu-zoom", "is-iah-zoom");
      mapBoard?.classList.remove("is-tamu-zoom", "is-iah-zoom");
      map.classList.add("is-tamu-zooming");
      mapBoard?.classList.add("is-tamu-zooming");
      initTamuLeafletMap(false);
      syncTamuLeafletSize();
      activePlace = element;
      element.classList.add("is-active");
      stateName.textContent = "Texas A&M Main Campus";
      stateCode.textContent = "Campus view";
      tooltip.hidden = true;
      resetViewButton.hidden = false;
      animateViewBox(tamuViewBox, () => {
        map.classList.remove("is-tamu-zooming");
        map.classList.add("is-tamu-zoom");
        mapBoard?.classList.remove("is-tamu-zooming");
        mapBoard?.classList.add("is-tamu-zoom");
        syncTamuLeafletSize();
        focusTexasLeaflet("tamu");
      });
    }

    function zoomToIah(element) {
      if (isPlaceZoomActive()) {
        return;
      }
      if (zoomedElement) {
        zoomedElement.classList.remove("is-zoomed", "is-active");
        zoomedElement = null;
      }
      if (activeState) {
        activeState.classList.remove("is-active");
        activeState = null;
      }
      clearActiveBorders();
      map.classList.remove("is-zoomed", "is-tamu-zoom", "is-iah-zoom");
      mapBoard?.classList.remove("is-tamu-zoom", "is-iah-zoom");
      map.classList.add("is-iah-zooming");
      mapBoard?.classList.add("is-iah-zooming");
      initIahLeafletMap(false);
      syncIahLeafletSize();
      activePlace = element;
      element.classList.add("is-active");
      stateName.textContent = "Houston / IAH";
      stateCode.textContent = "IAH map";
      tooltip.hidden = true;
      resetViewButton.hidden = false;
      animateViewBox(iahViewBox, () => {
        map.classList.remove("is-iah-zooming");
        map.classList.add("is-iah-zoom");
        mapBoard?.classList.remove("is-iah-zooming");
        mapBoard?.classList.add("is-iah-zoom");
        syncIahLeafletSize();
        focusTexasLeaflet("houston");
      });
    }

    function isPlaceZoomActive() {
      return map.classList.contains("is-tamu-zoom")
        || map.classList.contains("is-tamu-zooming")
        || map.classList.contains("is-iah-zoom")
        || map.classList.contains("is-iah-zooming");
    }

    renderTamuDetail();

    function findInteractiveState(target) {
      let node = target;
      while (node && node !== map) {
        if (interactiveStates.includes(node)) {
          return node;
        }
        node = node.parentElement;
      }
      return null;
    }

    function handleMapActivation(event) {
      if (isPlaceZoomActive()) {
        return;
      }
      const state = findInteractiveState(event.target);
      if (!state) {
        return;
      }
      if (event.type === "click" && performance.now() - lastPointerActivationAt < 500) {
        return;
      }
      event.preventDefault();
      if (event.type === "pointerdown") {
        lastPointerActivationAt = performance.now();
      }
      requestStateZoom(state);
    }

    function updatePinScale(box) {
      const isDefaultView = Math.abs(box.width - defaultViewBox.width) < 0.01;
      const targetScreenScale = isDefaultView ? 0.5 : 1;
      const pinScale = targetScreenScale * (box.width / defaultViewBox.width);
      campusPinScales.forEach((pinScaleGroup) => {
        pinScaleGroup?.setAttribute("transform", `scale(${pinScale})`);
      });
    }

    function setViewBox(box) {
      currentViewBox = box;
      map.setAttribute("viewBox", `${box.x} ${box.y} ${box.width} ${box.height}`);
      updatePinScale(box);
    }

    updatePinScale(defaultViewBox);

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function animateViewBox(targetBox, onComplete) {
      if (zoomAnimationId) {
        cancelAnimationFrame(zoomAnimationId);
      }

      const startBox = { ...currentViewBox };
      const duration = 780;
      const startTime = performance.now();

      function step(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(progress);
        const nextBox = {
          x: startBox.x + (targetBox.x - startBox.x) * eased,
          y: startBox.y + (targetBox.y - startBox.y) * eased,
          width: startBox.width + (targetBox.width - startBox.width) * eased,
          height: startBox.height + (targetBox.height - startBox.height) * eased,
        };
        setViewBox(nextBox);

        if (progress < 1) {
          zoomAnimationId = requestAnimationFrame(step);
        } else {
          zoomAnimationId = null;
          setViewBox(targetBox);
          onComplete?.();
        }
      }

      zoomAnimationId = requestAnimationFrame(step);
    }

    function clampViewBox(box) {
      const width = Math.min(box.width, defaultViewBox.width);
      const height = Math.min(box.height, defaultViewBox.height);
      const maxX = defaultViewBox.x + defaultViewBox.width - width;
      const maxY = defaultViewBox.y + defaultViewBox.height - height;
      return {
        x: clamp(box.x, defaultViewBox.x, maxX),
        y: clamp(box.y, defaultViewBox.y, maxY),
        width,
        height,
      };
    }

    function getZoomViewBox(element) {
      const box = element.getBBox();
      const aspect = defaultViewBox.width / defaultViewBox.height;
      let width = box.width;
      let height = box.height;

      if (width / height > aspect) {
        height = width / aspect;
      } else {
        width = height * aspect;
      }

      const zoomOut = 1.07;
      width *= zoomOut;
      height *= zoomOut;

      return {
        x: box.x + box.width / 2 - width / 2,
        y: box.y + box.height / 2 - height / 2,
        width,
        height,
      };
    }

    function requestStateZoom(element) {
      if (zoomedElement === element) {
        return;
      }
      zoomToState(element);
    }

    function zoomToState(element) {
      const code = element.dataset.stateCode || getStateCode(element);
      const targetBox = getZoomViewBox(element);
      if (activeState && activeState !== element && activeState !== zoomedElement) {
        activeState.classList.remove("is-active");
      }
      if (zoomedElement && zoomedElement !== element) {
        zoomedElement.classList.remove("is-zoomed", "is-active");
      }
      if (activePlace) {
        activePlace.classList.remove("is-active");
        activePlace = null;
      }

      exitPlaceZoom();
      activeState = element;
      zoomedElement = element;
      bringStateToFront(element);
      setActiveBorders(code, "is-zoomed-border");
      map.classList.add("is-zoomed");
      element.classList.remove("is-active");
      element.classList.add("is-zoomed");
      stateName.textContent = element.dataset.stateName;
      stateCode.textContent = code;
      tooltip.hidden = true;
      resetViewButton.hidden = false;
      animateViewBox(targetBox);
    }

    function resetMapView() {
      zoomedElement = null;
      exitPlaceZoom();
      resetViewButton.hidden = true;
      interactiveStates.forEach((element) => element.classList.remove("is-active", "is-zoomed"));
      map.classList.remove("is-zoomed");
      clearActiveBorders();
      activeState = null;
      stateName.textContent = "Texas";
      stateCode.textContent = "TX";
      tooltip.hidden = true;
      animateViewBox(defaultViewBox);
    }

    function moveTooltip(x, y) {
      const margin = 12;
      tooltip.style.left = `${clamp(x, margin, window.innerWidth - margin)}px`;
      tooltip.style.top = `${clamp(y, margin + 40, window.innerHeight - margin)}px`;
    }

    function showState(element, position) {
      if (isPlaceZoomActive()) {
        return;
      }
      const name = element.dataset.stateName;
      const code = element.dataset.stateCode;

      if (zoomedElement === element) {
        restoreZoomedStateDisplay();
        return;
      }

      if (activeState && activeState !== element && activeState !== zoomedElement) {
        activeState.classList.remove("is-active");
      }

      if (activePlace) {
        activePlace.classList.remove("is-active");
        activePlace = null;
      }

      activeState = element;
      bringStateToFront(element);
      setActiveBorders(code, "is-active-border");
      element.classList.add("is-active");
      stateName.textContent = name;
      stateCode.textContent = code;
      tooltip.innerHTML = `${name}<small>${code}</small>`;
      tooltip.hidden = false;

      if (position) {
        moveTooltip(position.x, position.y);
      } else {
        const box = element.getBoundingClientRect();
        moveTooltip(box.left + box.width / 2, box.top);
      }
    }

    function resetState(element) {
      if (zoomedElement !== element) {
        element.classList.remove("is-active");
      }
      if (activeState === element && zoomedElement !== element) {
        activeState = zoomedElement;
        restoreZoomedStateDisplay();
      }
    }

    interactiveStates.forEach((element, index) => {
      const title = element.querySelector("title");
      const name = title?.textContent.trim() || "District of Columbia";
      const code = getStateCode(element);

      if (index % 3 === 2) {
        element.classList.add("is-alt");
      }

      element.dataset.stateName = name;
      element.dataset.stateCode = code;
      element.setAttribute("tabindex", "0");
      element.setAttribute("role", "button");
      element.setAttribute("aria-label", `${name} (${code})`);
      title?.remove();

      element.addEventListener("pointerenter", (event) => showState(element, event));
      element.addEventListener("pointermove", (event) => moveTooltip(event.clientX, event.clientY));
      element.addEventListener("pointerleave", () => resetState(element));
      element.addEventListener("focus", () => showState(element));
      element.addEventListener("blur", () => resetState(element));
      element.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        lastPointerActivationAt = performance.now();
        requestStateZoom(element);
      });
      element.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (performance.now() - lastPointerActivationAt < 500) {
          return;
        }
        requestStateZoom(element);
      });
    });
    map.addEventListener("pointerdown", handleMapActivation);
    map.addEventListener("click", handleMapActivation);
    map.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        handleMapActivation(event);
      }
    });

    resetViewButton.addEventListener("click", resetMapView);
    resetViewButton.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        resetMapView();
      }
    });

    function activatePlace(element) {
      if (element.dataset.placeView === "tamu") {
        zoomToTamu(element);
      } else if (element.dataset.placeView === "iah") {
        zoomToIah(element);
      }
    }

    campusPins.forEach((element) => {
      const name = element.dataset.placeName;
      const coords = element.dataset.placeCoords;
      const title = element.querySelector("title");

      function showPlace(position) {
        if (isPlaceZoomActive() && activePlace === element) {
          return;
        }
        if (activeState) {
          activeState.classList.remove("is-active");
          activeState = null;
          clearActiveBorders();
        }
        if (activePlace && activePlace !== element) {
          activePlace.classList.remove("is-active");
        }

        activePlace = element;
        element.classList.add("is-active");
        stateName.textContent = name;
        stateCode.textContent = coords;
        tooltip.innerHTML = `${name}<small>${coords}</small>`;
        tooltip.hidden = false;

        if (position) {
          moveTooltip(position.x, position.y);
        } else {
          const box = element.getBoundingClientRect();
          moveTooltip(box.left + box.width / 2, box.top);
        }
      }

      function resetPlace() {
        if (isPlaceZoomActive() && activePlace === element) {
          return;
        }
        element.classList.remove("is-active");
        if (activePlace === element) {
          activePlace = null;
          if (zoomedElement) {
            restoreZoomedStateDisplay();
          } else {
            stateName.textContent = "Texas";
            stateCode.textContent = "TX";
            tooltip.hidden = true;
          }
        }
      }

      title?.remove();
      element.addEventListener("pointerenter", (event) => showPlace(event));
      element.addEventListener("pointermove", (event) => moveTooltip(event.clientX, event.clientY));
      element.addEventListener("pointerleave", resetPlace);
      element.addEventListener("focus", () => showPlace());
      element.addEventListener("blur", resetPlace);
      element.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        lastPointerActivationAt = performance.now();
        activatePlace(element);
      });
      element.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (performance.now() - lastPointerActivationAt < 500) {
          return;
        }
        activatePlace(element);
      });
      element.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          activatePlace(element);
        }
      });
    });
  </script>
</body>
